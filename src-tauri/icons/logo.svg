<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="55%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="tab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <radialGradient id="sparkle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <ellipse cx="320" cy="220" rx="380" ry="140" fill="#FFFFFF" opacity="0.12"/>

  <!-- Folder tab -->
  <path d="M 220 320
           L 460 320
           Q 500 320 520 360
           L 540 400
           L 220 400
           Z"
        fill="url(#tab)"/>

  <!-- Folder body -->
  <rect x="200" y="380" width="624" height="424" rx="48" ry="48" fill="url(#folder)"/>

  <!-- Inner subtle shadow -->
  <rect x="200" y="380" width="624" height="56" rx="48" ry="48" fill="#000000" opacity="0.06"/>

  <!-- AI lines (suggesting content) -->
  <rect x="280" y="500" width="320" height="22" rx="11" fill="#6366F1" opacity="0.30"/>
  <rect x="280" y="552" width="420" height="22" rx="11" fill="#6366F1" opacity="0.20"/>
  <rect x="280" y="604" width="260" height="22" rx="11" fill="#6366F1" opacity="0.15"/>

  <!-- Sparkle (AI accent) -->
  <g transform="translate(720,700)">
    <circle r="64" fill="url(#sparkle)" filter="url(#soft)" opacity="0.7"/>
    <path d="M 0 -56
             L 14 -14
             L 56 0
             L 14 14
             L 0 56
             L -14 14
             L -56 0
             L -14 -14
             Z"
          fill="#FFFFFF"/>
    <circle r="10" fill="#FDE68A"/>
  </g>

  <!-- Small sparkle -->
  <g transform="translate(800,460)">
    <path d="M 0 -22 L 6 -6 L 22 0 L 6 6 L 0 22 L -6 6 L -22 0 L -6 -6 Z" fill="#FFFFFF" opacity="0.9"/>
  </g>
  <g transform="translate(280,740)">
    <path d="M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z" fill="#FFFFFF" opacity="0.8"/>
  </g>
</svg>
